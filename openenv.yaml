name: sharperner-rl
title: SharpernerRL Federated Adversarial Environment
description: >
  Red-Blue adversarial federated learning simulation with
  attacker and defender agents across multiple difficulty levels.

type: space
runtime: fastapi
app: server.app:app
port: 8000

tags:
  - openenv
  - reinforcement-learning
  - federated-learning

tasks:
  - id: task1
    name: Task 1 (Easy - Detection Recall)
    description: >
      Measure defender recall of malicious client detection.
      Defender must identify poisoned clients across rounds.

  - id: task2
    name: Task 2 (Medium - Pattern Precision)
    description: >
      Measure defender precision and pattern recognition.
      Minimize false positives while maintaining detection.

  - id: task3
    name: Task 3 (Hard - Adversarial Resilience & Speed)
    description: >
      Measure advanced adversarial resilience and detection speed.
      Handle coordinated attacks and detect early.