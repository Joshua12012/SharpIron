name: sharperner-rl
title: SharpernerRL Federated Adversarial Environment
description: >
  Red-Blue adversarial federated learning simulation with
  attacker and defender agents across multiple difficulty levels.

type: space
runtime: fastapi
app: server.app:app
port: 8000

tags:
  - openenv
  - reinforcement-learning
  - federated-learning

tasks:
  - id: task1
    name: Task 1 (Easy - Detection Recall)
    description: Measure defender recall of malicious client detection.
    grader: grade_task1_recall

  - id: task2
    name: Task 2 (Medium - Pattern Precision)
    description: Measure defender precision and pattern recognition.
    grader: grade_task2_precision

  - id: task3
    name: Task 3 (Hard - Adversarial Resilience & Speed)
    description: Measure adversarial resilience and detection speed.
    grader: grade_task3_resilience